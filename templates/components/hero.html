<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 1 — Hero</title>
<link rel="stylesheet" href="base.css">
<style>
  .hero-body {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    gap: 24px;
    padding-top: 24px;
  }
  .hero-h1 { max-width: 900px; }
  .hero-sub { max-width: 720px; }
  .hero-cta-row { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
</style>
</head>
<body>
<section class="slide">
  <div class="top-bar">
    <div class="brand-mark">
      <div class="brand-sq"></div>
      <p>Linear</p>
    </div>
  </div>

  <div class="hero-body">
    <div class="eyebrow-row">
      <div class="dot"></div>
      <p class="t-eyebrow">5분 발표 · 통념 깨기</p>
    </div>

    <h1 class="t-display-xl hero-h1">또 LLM이<br>거짓말했다.</h1>

    <p class="t-subhead hero-sub">당신의 챗봇이 지난주 만든 환각, 진짜 원인은 모델이 아니라 조립 라인에 있다.</p>

    <div class="hero-cta-row">
      <div class="btn-primary">
        <p class="t-button">RAG 라인 보기 →</p>
      </div>
      <div class="btn-secondary">
        <p class="t-button">왜 파인튜닝이 답이 아닌가</p>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <p class="t-caption tertiary">이천송정초 · 이선학</p>
    <p class="t-mono tertiary">design.md / Linear · v1</p>
  </div>
</section>
</body>
</html>
