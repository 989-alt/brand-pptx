<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>05 · Pictogram Bar</title>
<link rel="stylesheet" href="base.css">
<style>
  .picto-body { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
                padding-top: 8px; align-items: end; }
  .picto-column { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .picto-callout { display: inline-flex; align-items: center; justify-content: center;
                   background: var(--c-surface-2); border: 1px solid var(--c-hairline);
                   border-radius: var(--r-md); padding: 6px 16px;
                   font-family: var(--ff-display); font-weight: 700; font-size: 26px;
                   color: var(--c-ink); letter-spacing: -0.5px; line-height: 1.2; }
  .picto-callout.is-accent { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
  .picto-stack { display: flex; flex-direction: column; gap: 5px; align-items: center; }
  .picto-icon-cell { width: 38px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .picto-icon-cell svg { width: 38px; height: 28px; }
  .picto-meta { display: flex; flex-direction: column; align-items: center; gap: 4px;
                padding-top: 8px; border-top: 1px solid var(--c-hairline);
                width: 220px; }
  .picto-meta .lbl { font-family: var(--ff-display); font-weight: 600; font-size: 15px;
                     color: var(--c-ink); letter-spacing: -0.2px; }
  .picto-meta.is-accent .lbl { color: var(--c-primary); }
  .picto-meta .yr  { font-family: var(--ff-mono); font-size: 11px; color: var(--c-ink-tertiary);
                     letter-spacing: 0.4px; }
</style>
</head>
<body>
<section class="slide">
  <div class="top-bar">
    <div class="brand-mark"><div class="brand-sq"></div><p>brand-pptx</p></div>
    <p class="t-mono tertiary">infographic · pictogram-bar</p>
  </div>

  <div class="slide-head" style="padding-top: 24px;">
    <div class="eyebrow-row"><div class="dot"></div><p class="t-eyebrow">학습 효율 비교 · 분야별</p></div>
    <h2 class="t-display-md">읽기·쓰기·코딩, 다 같지 않다.</h2>
  </div>

  <div class="picto-body">
    <!-- COLUMN 1: 읽기 × 1.4 (3 icons) -->
    <div class="picto-column">
      <div class="picto-callout">× 1.4</div>
      <div class="picto-stack">
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#62666d"/><rect x="5" y="6" width="28" height="2" fill="#0f1011"/><rect x="5" y="11" width="24" height="2" fill="#0f1011"/><rect x="5" y="16" width="26" height="2" fill="#0f1011"/><rect x="5" y="21" width="18" height="2" fill="#0f1011"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#62666d"/><rect x="5" y="6" width="28" height="2" fill="#0f1011"/><rect x="5" y="11" width="24" height="2" fill="#0f1011"/><rect x="5" y="16" width="26" height="2" fill="#0f1011"/><rect x="5" y="21" width="18" height="2" fill="#0f1011"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#62666d"/><rect x="5" y="6" width="28" height="2" fill="#0f1011"/><rect x="5" y="11" width="24" height="2" fill="#0f1011"/><rect x="5" y="16" width="26" height="2" fill="#0f1011"/><rect x="5" y="21" width="18" height="2" fill="#0f1011"/></svg></div>
      </div>
      <div class="picto-meta">
        <p class="lbl">읽기 · 요약</p>
        <p class="yr">AI 보조 사용 시 시간 단축 배수</p>
      </div>
    </div>

    <!-- COLUMN 2: 쓰기 × 2.1 (5 icons) -->
    <div class="picto-column">
      <div class="picto-callout">× 2.1</div>
      <div class="picto-stack">
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><path d="M6 22 L26 4 L32 10 L12 28 Z" fill="#62666d"/><path d="M26 4 L29 1 L35 7 L32 10 Z" fill="#62666d"/><path d="M6 22 L9 25 L12 28 Z" fill="#34343a"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><path d="M6 22 L26 4 L32 10 L12 28 Z" fill="#62666d"/><path d="M26 4 L29 1 L35 7 L32 10 Z" fill="#62666d"/><path d="M6 22 L9 25 L12 28 Z" fill="#34343a"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><path d="M6 22 L26 4 L32 10 L12 28 Z" fill="#62666d"/><path d="M26 4 L29 1 L35 7 L32 10 Z" fill="#62666d"/><path d="M6 22 L9 25 L12 28 Z" fill="#34343a"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><path d="M6 22 L26 4 L32 10 L12 28 Z" fill="#62666d"/><path d="M26 4 L29 1 L35 7 L32 10 Z" fill="#62666d"/><path d="M6 22 L9 25 L12 28 Z" fill="#34343a"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><path d="M6 22 L26 4 L32 10 L12 28 Z" fill="#62666d"/><path d="M26 4 L29 1 L35 7 L32 10 Z" fill="#62666d"/><path d="M6 22 L9 25 L12 28 Z" fill="#34343a"/></svg></div>
      </div>
      <div class="picto-meta">
        <p class="lbl">쓰기 · 초안</p>
        <p class="yr">AI 보조 사용 시 시간 단축 배수</p>
      </div>
    </div>

    <!-- COLUMN 3 (ACCENT): 코딩 × 3.5 (7 icons) -->
    <div class="picto-column">
      <div class="picto-callout is-accent">× 3.5</div>
      <div class="picto-stack">
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="picto-icon-cell"><svg viewBox="0 0 38 28"><rect x="2" y="3" width="34" height="22" rx="2" fill="#5e6ad2"/><path d="M11 11 L7 14 L11 17 M27 11 L31 14 L27 17 M22 8 L16 20" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="picto-meta is-accent">
        <p class="lbl">코딩 · 보일러플레이트</p>
        <p class="yr">AI 보조 사용 시 시간 단축 배수</p>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <p class="t-caption tertiary">막대 1칸 = 시간 단축 1배. 도구가 의미 있는 자리를 골라 쓰자.</p>
    <p class="t-mono tertiary">slide 05 / 07</p>
  </div>
</section>
</body>
</html>
